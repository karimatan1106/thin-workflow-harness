[package]
name = "thin-workflow-harness"
version = "0.1.0"
edition = "2021"
description = "軽量ワークフローハーネス (thin harness / fat skills / 決定論的な状態管理)"

[[bin]]
name = "harness"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[profile.release]
lto = true
strip = true
