[workspace]
members = ["crates/harness-core", "crates/harness"]
exclude = [
    "crates/harness/tests/fixtures/sample_workspace_rust",
    "crates/harness/tests/fixtures/sample_workspace_go",
    "crates/harness/tests/fixtures/sample_workspace_py",
    "crates/harness/tests/fixtures/sample_workspace_ts",
    "crates/harness/tests/fixtures/sample_rust",
    "crates/harness/tests/fixtures/repo_rust",
    "crates/harness/tests/fixtures/repo_node",
    "crates/harness/tests/fixtures/repo_ci",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
ureq = { version = "2", features = ["json"] }
tree-sitter = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.25"
tree-sitter-go = "0.25"
lsp-types = "0.97"

[profile.release]
lto = true
strip = true
